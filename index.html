<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Capture & Inventory Pro</title>
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Phosphor Icons (Premium SVG Icons) -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    
    <!-- Supabase JS SDK -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <style>
        :root {
            --bg: #e0e5ec;
            --text-main: #2d3436;
            --text-muted: #636e72;
            --shadow-light: #ffffff;
            --shadow-dark: #a3b1c6;
            --primary: #4F46E5; /* Indigo */
            --primary-hover: #4338ca;
            --danger: #ff4757;
            --glass-bg: rgba(255, 255, 255, 0.35);
            --glass-border: rgba(255, 255, 255, 0.5);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Poppins', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
        }

        /* --- Elevated Neomorphism --- */
        .neo-box {
            background: var(--bg);
            border-radius: 24px;
            box-shadow: 10px 10px 20px var(--shadow-dark), 
                       -10px -10px 20px var(--shadow-light);
        }
        
        .neo-btn {
            background: var(--bg);
            border: none;
            padding: 16px 32px;
            border-radius: 50px;
            color: var(--text-main);
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 7px 7px 14px var(--shadow-dark), 
                       -7px -7px 14px var(--shadow-light);
            transition: all 0.2s ease-in-out;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            outline: none;
        }

        .neo-btn:hover {
            color: var(--primary);
        }

        .neo-btn:active {
            box-shadow: inset 5px 5px 10px var(--shadow-dark), 
                        inset -5px -5px 10px var(--shadow-light);
            color: var(--primary);
        }

        .neo-btn-primary {
            color: var(--primary);
        }

        /* Pressed-in Neomorphic Inputs */
        .input-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
            margin-bottom: 16px;
        }

        .input-group label {
            font-size: 13px;
            font-weight: 600;
            color: var(--text-muted);
            padding-left: 10px;
        }

        .neo-input {
            width: 100%;
            background: var(--bg);
            border: none;
            padding: 14px 20px;
            border-radius: 16px;
            outline: none;
            color: var(--text-main);
            font-weight: 500;
            box-shadow: inset 5px 5px 10px var(--shadow-dark), 
                        inset -5px -5px 10px var(--shadow-light);
            transition: all 0.3s ease;
        }

        .neo-input:focus {
            box-shadow: inset 7px 7px 14px var(--shadow-dark), 
                        inset -7px -7px 14px var(--shadow-light);
        }

        .neo-input::placeholder {
            color: #a0aabf;
        }

        /* --- Premium Glassmorphism --- */
        .glass-panel {
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.07);
        }

        /* --- Layout & Core --- */
        header {
            width: 90%;
            max-width: 1000px;
            padding: 24px;
            text-align: center;
            margin-top: 30px;
            margin-bottom: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }

        header h1 {
            font-size: 26px;
            font-weight: 700;
            letter-spacing: -0.5px;
            color: var(--text-main);
        }

        header i {
            font-size: 32px;
            color: var(--primary);
        }

        .container {
            width: 90%;
            max-width: 1000px;
            padding-bottom: 80px;
        }

        .view-section {
            display: none;
            animation: fadeIn 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .view-section.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* --- Home View --- */
        .home-menu {
            display: flex;
            flex-direction: column;
            gap: 30px;
            align-items: center;
            margin-top: 40px;
        }

        .home-btn {
            width: 280px;
            height: 90px;
            font-size: 18px;
            border-radius: 24px;
        }

        .home-btn i {
            font-size: 28px;
        }

        /* --- Capture View --- */
        .nav-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }

        /* Custom Radio Buttons */
        .mode-selector {
            display: flex;
            justify-content: center;
            padding: 8px;
            border-radius: 18px;
            gap: 10px;
            margin-bottom: 24px;
        }

        .mode-label {
            position: relative;
            cursor: pointer;
            padding: 12px 24px;
            font-weight: 600;
            font-size: 14px;
            color: var(--text-muted);
            border-radius: 12px;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .mode-label input {
            display: none;
        }

        .mode-label.active {
            color: var(--primary);
            box-shadow: inset 4px 4px 8px var(--shadow-dark), 
                        inset -4px -4px 8px var(--shadow-light);
        }

        /* Camera Pro UI */
        .camera-wrapper {
            position: relative;
            width: 100%;
            max-width: 500px;
            margin: 0 auto;
            border-radius: 32px;
            padding: 10px;
            background: var(--bg);
            box-shadow: 10px 10px 20px var(--shadow-dark), -10px -10px 20px var(--shadow-light);
        }

        .camera-container {
            position: relative;
            width: 100%;
            aspect-ratio: 3/4;
            border-radius: 24px;
            overflow: hidden;
            background: #111;
        }

        #camera-feed {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        /* Rule of Thirds Grid */
        .camera-grid {
            position: absolute;
            inset: 0;
            pointer-events: none;
            background-image: 
                linear-gradient(to right, transparent calc(33.33% - 0.5px), rgba(255,255,255,0.4) 33.33%, transparent calc(33.33% + 0.5px), transparent calc(66.66% - 0.5px), rgba(255,255,255,0.4) 66.66%, transparent calc(66.66% + 0.5px)),
                linear-gradient(to bottom, transparent calc(33.33% - 0.5px), rgba(255,255,255,0.4) 33.33%, transparent calc(33.33% + 0.5px), transparent calc(66.66% - 0.5px), rgba(255,255,255,0.4) 66.66%, transparent calc(66.66% + 0.5px));
        }

        /* Center Crosshair */
        .camera-crosshair {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 40px;
            height: 40px;
            pointer-events: none;
            border: 1px solid rgba(255,255,255,0.5);
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .camera-crosshair::before, .camera-crosshair::after {
            content: '';
            position: absolute;
            background: rgba(255,255,255,0.8);
        }
        .camera-crosshair::before { width: 2px; height: 10px; }
        .camera-crosshair::after { width: 10px; height: 2px; }

        .camera-controls {
            position: absolute;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            align-items: center;
            gap: 30px;
            padding: 12px 24px;
            z-index: 10;
        }

        /* DSLR Shutter Button */
        .shutter-btn {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            border: none;
            background: transparent;
            position: relative;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            outline: none;
        }
        .shutter-btn::before {
            content: '';
            position: absolute;
            inset: 0;
            border: 4px solid white;
            border-radius: 50%;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }
        .shutter-btn::after {
            content: '';
            position: absolute;
            width: 54px;
            height: 54px;
            background: white;
            border-radius: 50%;
            transition: transform 0.15s ease-out;
        }
        .shutter-btn:active::after {
            transform: scale(0.85);
            background: #f0f0f0;
        }

        .icon-btn {
            background: rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.2);
            color: white;
            border-radius: 50%;
            width: 48px;
            height: 48px;
            font-size: 24px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(8px);
            transition: background 0.2s;
        }
        .icon-btn:hover { background: rgba(0,0,0,0.5); }

        /* --- Inventory View --- */
        .inventory-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 30px;
        }

        .inventory-card {
            padding: 24px;
            display: flex;
            flex-direction: column;
        }

        .inventory-img-wrapper {
            position: relative;
            width: 100%;
            padding-top: 75%; /* 4:3 Aspect Ratio */
            border-radius: 16px;
            overflow: hidden;
            margin-bottom: 20px;
            box-shadow: inset 4px 4px 8px var(--shadow-dark), inset -4px -4px 8px var(--shadow-light);
        }

        .inventory-img {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            object-fit: cover;
            border-radius: 16px;
        }

        .empty-state {
            grid-column: 1 / -1;
            text-align: center;
            padding: 60px 20px;
            color: var(--text-muted);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }
        .empty-state i { font-size: 64px; color: #b0b8c9; }

        /* --- Global Components --- */
        .toast {
            position: fixed;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%) translateY(120px);
            padding: 16px 32px;
            color: white;
            font-weight: 500;
            font-size: 15px;
            border-radius: 50px;
            opacity: 0;
            transition: all 0.5s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            z-index: 9999;
            background: rgba(79, 70, 229, 0.9);
            display: flex;
            align-items: center;
            gap: 12px;
            box-shadow: 0 10px 30px rgba(79, 70, 229, 0.3);
        }
        .toast i { font-size: 20px; }
        .toast.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }

        /* Overlay Loader */
        .loader-overlay {
            position: fixed;
            inset: 0;
            background: rgba(224, 229, 236, 0.8);
            backdrop-filter: blur(5px);
            z-index: 10000;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: var(--primary);
            font-weight: 600;
            gap: 15px;
        }
        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid rgba(79, 70, 229, 0.2);
            border-top: 4px solid var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

    </style>
</head>
<body>

    <!-- Global Fullscreen Loader -->
    <div id="loader" class="loader-overlay">
        <div class="spinner"></div>
        <span id="loader-text">Processing...</span>
    </div>

    <!-- Header -->
    <header class="neo-box">
        <i class="ph-fill ph-aperture"></i>
        <h1>Capture the Steps
        </h1>
    </header>

    <div class="container">
        
        <!-- ================= HOME VIEW ================= -->
        <section id="view-home" class="view-section active">
            <div class="home-menu">
                <button class="neo-btn home-btn neo-btn-primary" onclick="navTo('capture')">
                    <i class="ph ph-camera"></i> Launch Camera
                </button>
                <button class="neo-btn home-btn" onclick="navTo('inventory')">
                    <i class="ph ph-package"></i> View Inventory
                </button>
            </div>
        </section>

        <!-- ================= CAPTURE VIEW ================= -->
        <section id="view-capture" class="view-section">
            <div class="nav-bar">
                <button class="neo-btn" onclick="navTo('home')">
                    <i class="ph ph-arrow-left"></i> Back
                </button>
            </div>
            
            <div class="mode-selector neo-box">
                <label class="mode-label active" id="label-single">
                    <input type="radio" name="captureMode" value="single" checked onchange="updateModeUI()"> 
                    <i class="ph ph-image"></i> Single
                </label>
                <label class="mode-label" id="label-multi">
                    <input type="radio" name="captureMode" value="multiple" onchange="updateModeUI()"> 
                    <i class="ph ph-images"></i> Multiple
                </label>
            </div>

            <div class="camera-wrapper">
                <div class="camera-container">
                    <video id="camera-feed" autoplay playsinline></video>
                    <div class="camera-grid"></div>
                    <div class="camera-crosshair"></div>
                    
                    <div class="camera-controls glass-panel">
                        <button class="icon-btn" onclick="switchCamera()" title="Flip Camera">
                            <i class="ph ph-arrows-clockwise"></i>
                        </button>
                        <button class="shutter-btn" onclick="takePhoto()" title="Capture"></button>
                        <!-- Spacer for balance -->
                        <div style="width: 48px;"></div> 
                    </div>
                </div>
            </div>
        </section>

        <!-- ================= INVENTORY VIEW ================= -->
        <section id="view-inventory" class="view-section">
            <div class="nav-bar">
                <button class="neo-btn" onclick="navTo('home')">
                    <i class="ph ph-arrow-left"></i> Back
                </button>
                <button class="neo-btn neo-btn-primary" onclick="exportCSV()">
                    <i class="ph ph-download-simple"></i> Export CSV
                </button>
            </div>
            
            <div id="inventory-list" class="inventory-grid">
                <!-- Items injected dynamically -->
            </div>
        </section>
    </div>

    <!-- Hidden Canvas -->
    <canvas id="canvas" style="display: none;"></canvas>

    <!-- Premium Toast -->
    <div id="toast" class="toast">
        <i class="ph-fill ph-check-circle"></i>
        <span id="toast-msg">Success!</span>
    </div>

    <script>
        // ==========================================
        // 1. SUPABASE CONFIGURATION
        // Replace with your Supabase details
        // ==========================================
        const SUPABASE_URL = 'https://uoeqqiaobgyjicgexgtt.supabase.co'; 
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVvZXFxaWFvYmd5amljZ2V4Z3R0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM0MzE2MzgsImV4cCI6MjA4OTAwNzYzOH0.ty_mBkB_b8TA4z3iYldvI3tNeP4M_Iff_ZlH08K3kVs';
        
        const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // ==========================================
        // STATE VARIABLES
        // ==========================================
        let currentStream = null;
        let facingMode = 'environment';
        let inventoryData =[];

        // ==========================================
        // UI HELPERS
        // ==========================================
        function navTo(view) {
            document.querySelectorAll('.view-section').forEach(sec => sec.classList.remove('active'));
            document.getElementById(`view-${view}`).classList.add('active');
            
            if(view === 'capture') startCamera();
            else stopCamera();

            if(view === 'inventory') loadInventory();
        }

        function showToast(message) {
            document.getElementById('toast-msg').innerText = message;
            const toast = document.getElementById('toast');
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 3000);
        }

        function toggleLoader(show, text = "Processing...") {
            const loader = document.getElementById('loader');
            document.getElementById('loader-text').innerText = text;
            loader.style.display = show ? 'flex' : 'none';
        }

        function updateModeUI() {
            const isSingle = document.querySelector('input[value="single"]').checked;
            document.getElementById('label-single').classList.toggle('active', isSingle);
            document.getElementById('label-multi').classList.toggle('active', !isSingle);
        }

        // ==========================================
        // CAMERA LOGIC
        // ==========================================
        async function startCamera() {
            if (currentStream) stopCamera();
            
            const constraints = {
                video: { facingMode: facingMode, width: { ideal: 1920 }, height: { ideal: 1080 } }
            };

            try {
                currentStream = await navigator.mediaDevices.getUserMedia(constraints);
                document.getElementById('camera-feed').srcObject = currentStream;
            } catch (err) {
                console.error("Camera error: ", err);
                alert("Please allow camera access to use this feature.");
            }
        }

        function stopCamera() {
            if (currentStream) {
                currentStream.getTracks().forEach(track => track.stop());
                currentStream = null;
            }
        }

        function switchCamera() {
            facingMode = facingMode === 'environment' ? 'user' : 'environment';
            startCamera();
        }

        async function takePhoto() {
            const video = document.getElementById('camera-feed');
            const canvas = document.getElementById('canvas');
            const mode = document.querySelector('input[name="captureMode"]:checked').value;
            
            // Map video to canvas
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
            
            toggleLoader(true, "Saving securely to cloud...");
            
            canvas.toBlob(async (blob) => {
                const fileName = `capture_${Date.now()}.jpg`;
                
                try {
                    // Upload via Supabase
                    const { error: uploadError } = await supabaseClient.storage
                        .from('images')
                        .upload(fileName, blob, { contentType: 'image/jpeg' });
                        
                    if (uploadError) throw uploadError;

                    // Get URL
                    const { data: urlData } = supabaseClient.storage
                        .from('images')
                        .getPublicUrl(fileName);
                    
                    // Insert Record
                    const { error: dbError } = await supabaseClient
                        .from('inventory_items')
                        .insert([{ image_url: urlData.publicUrl }]);
                    
                    if (dbError) throw dbError;

                    toggleLoader(false);
                    showToast("Photo captured & saved!");

                    if (mode === 'single') navTo('inventory');

                } catch (err) {
                    console.error("Upload failed", err);
                    alert("Failed to save. Ensure Supabase URL/Key are set correctly.");
                    toggleLoader(false);
                }
            }, 'image/jpeg', 0.85);
        }

        // ==========================================
        // INVENTORY LOGIC
        // ==========================================
        async function loadInventory() {
            toggleLoader(true, "Loading inventory...");
            const list = document.getElementById('inventory-list');
            list.innerHTML = ''; 

            try {
                const { data, error } = await supabaseClient
                    .from('inventory_items')
                    .select('*')
                    .order('created_at', { ascending: false });

                if (error) throw error;
                inventoryData = data;

                if(data.length === 0) {
                    list.innerHTML = `
                        <div class="empty-state neo-box">
                            <i class="ph ph-package"></i>
                            <h3>Your inventory is empty</h3>
                            <p>Go back to the camera to capture some items.</p>
                        </div>`;
                    return;
                }

                data.forEach(item => {
                    const card = document.createElement('div');
                    card.className = 'neo-box inventory-card';
                    card.innerHTML = `
                        <div class="inventory-img-wrapper">
                            <img src="${item.image_url}" class="inventory-img" loading="lazy">
                        </div>
                        
                        <div class="input-group">
                            <label><i class="ph ph-barcode"></i> Model Number</label>
                            <input type="text" class="neo-input" id="model-${item.id}" value="${item.model_no || ''}" placeholder="e.g. RTX-4090">
                        </div>
                        
                        <div class="input-group" style="margin-bottom: 24px;">
                            <label><i class="ph ph-ruler"></i> Sizes Available</label>
                            <input type="text" class="neo-input" id="size-${item.id}" value="${item.sizes_available || ''}" placeholder="e.g. S, M, L">
                        </div>

                        <button class="neo-btn neo-btn-primary" onclick="updateItem('${item.id}', this)" style="width: 100%;">
                            <i class="ph ph-floppy-disk"></i> Save Details
                        </button>
                    `;
                    list.appendChild(card);
                });
            } catch (err) {
                console.error("Error fetching", err);
                list.innerHTML = `<p style="color:var(--danger); text-align:center; width:100%;">Error loading data. Check console.</p>`;
            } finally {
                toggleLoader(false);
            }
        }

        async function updateItem(id, btnElement) {
            const modelNo = document.getElementById(`model-${id}`).value;
            const sizes = document.getElementById(`size-${id}`).value;
            const originalText = btnElement.innerHTML;
            
            btnElement.innerHTML = `<i class="ph ph-spinner ph-spin"></i> Saving...`;
            btnElement.style.pointerEvents = 'none';

            try {
                const { error } = await supabaseClient
                    .from('inventory_items')
                    .update({ model_no: modelNo, sizes_available: sizes })
                    .eq('id', id);

                if (error) throw error;
                
                const itemIndex = inventoryData.findIndex(i => i.id === id);
                if(itemIndex > -1) {
                    inventoryData[itemIndex].model_no = modelNo;
                    inventoryData[itemIndex].sizes_available = sizes;
                }

                showToast("Details updated successfully");
            } catch (err) {
                console.error("Error updating", err);
                alert("Failed to update item.");
            } finally {
                btnElement.innerHTML = originalText;
                btnElement.style.pointerEvents = 'auto';
            }
        }

        // ==========================================
        // EXPORT TO CSV LOGIC
        // ==========================================
        function exportCSV() {
            if (inventoryData.length === 0) {
                alert("No data available to export.");
                return;
            }

            let csvContent = "ID,Model No,Sizes Available,Image URL,Capture Date\n";

            inventoryData.forEach(row => {
                const id = row.id;
                const model = `"${(row.model_no || '').replace(/"/g, '""')}"`;
                const size = `"${(row.sizes_available || '').replace(/"/g, '""')}"`;
                const imgUrl = `"${row.image_url}"`;
                const date = `"${new Date(row.created_at).toLocaleString()}"`;
                
                csvContent += `${id},${model},${size},${imgUrl},${date}\n`;
            });

            const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
            const url = URL.createObjectURL(blob);
            
            const link = document.createElement("a");
            link.href = url;
            link.download = `Inventory_Export_${new Date().toISOString().split('T')[0]}.csv`;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            showToast("CSV Downloaded!");
        }

    </script>
</body>
</html>
